<!doctype html>
<html lang="es" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISTEA E-Commerce</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link rel="stylesheet" href="/styles/ecommerce.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container-fluid px-4 px-md-5">
        <div class="topbar-content d-flex align-items-center justify-content-between">
          <div class="brand">
            <img src="images/istea_logo.png" alt="Logo del comercio electrónico de ISTEA" class="logo-img"/>
          </div>

          <div class="search-wrapper">
            <input type="text" class="search-input" placeholder="Buscar Productos..." />
            <button class="search-btn">
              <i class="bi bi-search"></i>
            </button>
          </div>
      <div class="d-flex align-items-center gap-3">
  <button
    type="button"
    class="btn btn-outline-secondary theme-toggle"
    onclick="toggleTheme()"
  >
    <i class="bi bi-moon-fill"></i>
  </button>

  <div class="cart-wrapper">
    <i class="bi bi-cart3 cart-icon"></i>
    <span class="cart-badge"></span>
  </div>
</div>
        </div>
      </div>
    </header>

    <main class="products-section">
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="listado-productos">
      </div>
    </main> 

    <footer class="footer">© 2026 ISTEA E-Commerce.</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <script src="./scripts/theme.js"></script>
    <script src="./scripts/ecommerce.js"></script>
    
  </body>
</html>

<!doctype html>
<html lang="es" data-bs-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISTEA E-Commerce</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/styles/ecommerce.css" />
  </head>
  <body>
    <header class="topbar" role="banner">
      <div class="container-fluid px-4 px-md-5">
        <div
          class="topbar-content d-flex align-items-center justify-content-between"
        >
          <div class="brand">
            <img
              src="images/istea_logo.png"
              alt="Logo del comercio electrónico de ISTEA"
              class="logo-img"
            />
          </div>

          <div class="search-wrapper" role="search">
            <label for="buscador" class="visually-hidden">Buscar Productos</label>
            <input
              type="text"
              id="buscador"
              class="search-input"
              placeholder="Buscar Productos..."
              aria-label="Buscar Productos"
            />
            <button class="search-btn" aria-label="Buscar">
              <i class="bi bi-search"></i>
            </button>
          </div>
          <div class="d-flex align-items-center gap-3">
            <button
              type="button"
              class="btn btn-outline-secondary theme-toggle"
              onclick="toggleTheme()"
              aria-label="Cambiar modo oscuro"
            >
              <i class="bi bi-moon-fill"></i>
            </button>
            <button
              class="cart-wrapper btn border-0 bg-transparent"
              type="button"
              data-bs-toggle="offcanvas"
              data-bs-target="#cartOffcanvas"
              aria-controls="cartOffcanvas"
              aria-label="Abrir carrito de compras"
            >
              <i class="bi bi-cart3 cart-icon" aria-hidden="true"></i>
              <span class="cart-badge" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="products-section" role="main" aria-label="Catálogo de productos">
      <div
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"
        id="listado-productos"
      ></div>
    </main>

    <footer class="footer" role="contentinfo">© 2026 ISTEA E-Commerce.</footer>
    <!--Carrito con productos-->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="offcanvasRightLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title" id="offcanvasRightLabel">
          Carrito de Compras
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Cerrar carrito"></button>
      </div>
      <div class="offcanvas-body" id="cart-aside">
        <!--productos del carrito generado con JS-->
      </div>
      <div class="offcanvas-footer d-flex justify-content-center align-items-center gap-3 py-3">
        <button id="btn-vaciar-carrito" class="btn btn-close-white">Vaciar Carrito</button>
        <button class="btn btn-dark">Finalizar Compra</button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="./scripts/theme.js"></script>
    <script src="./scripts/ecommerce.js"></script>
  </body>
</html>

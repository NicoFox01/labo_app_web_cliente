<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISTEA E-Commerce</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="/styles/ecommerce.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container-fluid px-4 px-md-5">
        <div
          class="topbar-content d-flex align-items-center justify-content-between"
        >
          <div class="brand">
            <img
              src="images/istea_logo.png"
              alt="ISTEA Logo"
              class="logo-img"
            />
          </div>

          <div class="search-wrapper">
            <input
              type="text"
              class="search-input"
              placeholder="Search for products..."
            />
            <button class="search-btn">
              <i class="bi bi-search"></i>
            </button>
          </div>

          <div class="cart-wrapper">
            <i class="bi bi-cart3 cart-icon"></i>
            <span class="cart-badge"></span>
          </div>
        </div>
      </div>
    </header>

    <main class="products-section">
      <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" id="listado-productos">
        <!-- cards generadas desde JS -->
      </div>
    </main>

    <footer class="footer">© 2026 ISTEA E-Commerce.</footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./scripts/ecommerce.js"></script>
<div id="productModal" class="product-modal">
    <div class="product-modal-content">
        <span class="product-close" onclick="closeProductModal()">&times;</span>

        <img id="modal-img" class="product-modal-img" alt="Producto">

        <h3 id="modal-title"></h3>
        <p id="modal-price"></p>
        <p id="modal-description"></p>

        <button class="product-modal-btn" onclick="addToCartAndClose()">
            Agregar al carrito
        </button>
    </div>
</div>

  </body>
</html>

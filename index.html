<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="styles/login.css">
    <title>Labo_AppWeb</title>
</head>
<body>
    <main>
        <div class="login-theme-bar">
            <button
                type="button"
                class="btn btn-outline-secondary theme-toggle"
                onclick="toggleTheme()"
                aria-label="Cambiar tema"
                title="Cambiar tema"
            >
                <i class="bi bi-moon-fill"></i>
            </button>
        </div>

        <div class="login-container">
            <img src="images/istea_logo.png" id="logo" alt="Logo de ISTEA">
            <form>
                <label for="username"> Username:</label>
                <input type="text" id="username" name="username" placeholder="Nombre de Usuario" aria-required="true">
                <label for="password"> Password:</label>
                <input type="password" id="password" name="password" placeholder="Contraseña" aria-required="true">
                <p id="login-error" class="login-error" aria-live="polite"></p>
                <button type="submit" class="login-btn">Login</button>
            </form>
            <button class="qa-btn" onclick="openModal()" aria-label="Abrir preguntas frecuentes">Q&A</button>
        </div>

        <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
            <div class="modal-content">
                <span class="close" role="button" aria-label="Cerrar" onclick="closeModal()">&times;</span>
                <h3 id="modal-title">¿Cómo iniciar sesión?</h3>
                <p>Para iniciar sesión, se comparten las siguientes credenciales debido a que las de Fake Store API no funcionan.</p>
                <br>
                <p>Usuario: mor_2314</p>
                <p>Contraseña: 83r5^_</p>
            </div>
        </div>
    </main> 

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="scripts/theme.js"></script>
    <script src="scripts/login.js"></script>
</body>
</html>
